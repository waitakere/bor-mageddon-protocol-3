name: Mirror to Backup Account

on:
  push:
    branches:
      - '*' # Triggers on any branch push
  delete:   # Triggers when a branch is deleted

jobs:
  mirror-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history, branches, and tags
          persist-credentials: false # <--- THIS IS THE MAGIC FIX

      - name: Push Mirror to Backup
        run: |
          # 1. Set up credentials
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 2. Add the backup account as a remote
          git remote add backup https://${{ secrets.BACKUP_TOKEN }}@github.com/waitakere/bor-mageddon-protocol-3.git
          
          # 3. Force push all branches and tags to the backup
          git push --mirror backup
